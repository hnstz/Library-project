<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Library</title>
</head>

<body>
    <header>
        <button id="addBtn">add a new book</button>
    </header>
    <main>
        <form action="" id="form" class="hiddenForm">
            <label for="title">title:</label>
            <input type="text" name="title">
            <label for="author">author:</label>
            <input type="text" name="author">
            <label for="pagesAmount">pages amount:</label>
            <input type="text" name="pagesAmount">
            <div class="radioContainer">
                <p>have you read this book?</p>
                <input type="radio" name="read" value="true">
                <label for="opt1">yes</label><br>

                <input type="radio" name="read" value="false">
                <label for="opt2">no</label><br>
            </div>
            <button>create</button>
        </form>
    </main>

</body>

</html>
